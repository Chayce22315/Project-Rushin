name: Build ProjectRushin (Unsigned)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_all:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Select latest Xcode
      - name: Use Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      # Install XcodeGen PROPERLY (no Homebrew chaos)
      - name: Install XcodeGen (Mint)
        run: |
          brew install mint
          mint install yonaskolb/XcodeGen

      # Generate project
      - name: Generate Project
        run: mint run xcodegen generate --spec project.yml --project ProjectRushin.xcodeproj

      # Build (no signing needed)
      - name: Build App
        run: |
          xcodebuild \
            -project ProjectRushin.xcodeproj \
            -scheme ProjectRushin \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      # Zip app (since unsigned IPA export is annoying)
      - name: Package App
        run: |
          cd build/Build/Products/Release-iphonesimulator
          zip -r ProjectRushin.zip ProjectRushin.app

      # Upload artifact
      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRushin-App
          path: build/Build/Products/Release-iphonesimulator/ProjectRushin.zip
