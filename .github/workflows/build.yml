name: Build ProjectRUSHIN iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Job 1: Setup macOS environment
  setup:
    name: Setup Environment
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Homebrew & XcodeGen
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> $GITHUB_ENV
          eval "$(/opt/homebrew/bin/brew shellenv)"
          brew install xcodegen

      - name: Install CocoaPods (if needed)
        run: |
          sudo gem install cocoapods

  # Job 2: Generate Xcode project
  generate_project:
    name: Generate Xcode Project
    runs-on: macos-latest
    needs: setup
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PATH for Homebrew
        run: echo "PATH=$PATH:/opt/homebrew/bin" >> $GITHUB_ENV

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml --project ProjectRUSHIN.xcodeproj

  # Job 3: Build unsigned Xcode project
  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    needs: generate_project
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PATH for Homebrew
        run: echo "PATH=$PATH:/opt/homebrew/bin" >> $GITHUB_ENV

      - name: Build Xcode Project
        run: |
          xcodebuild \
            -project ProjectRUSHIN.xcodeproj \
            -scheme ProjectRUSHIN \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=build \
            clean build

  # Job 4: Package IPA
  package:
    name: Package IPA
    runs-on: macos-latest
    needs: build
    steps:
      - name: Create IPA
        run: |
          mkdir -p build/IPA
          xcodebuild -exportArchive \
            -archivePath build/ProjectRUSHIN.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/IPA || true

      - name: List IPA Files
        run: ls -la build/IPA

  # Job 5: Summary and Upload Artifact
  summary:
    name: Upload IPA & Summary
    runs-on: macos-latest
    needs: package
    steps:
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRUSHIN-IPA
          path: build/IPA/*.ipa

      - name: Workflow Summary
        run: |
          echo "Build and packaging complete!"
          echo "Unsigned IPA uploaded as artifact."