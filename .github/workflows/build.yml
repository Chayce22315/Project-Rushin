name: Project RUSHIN iOS Clean Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # 1️⃣ setup
  setup:
    name: Setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Verify
        run: xcodegen --version

  # 2️⃣ generate project
  generate:
    name: Generate Project
    runs-on: macos-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: xcodegen generate --spec project.yml

      - name: Show files
        run: ls

  # 3️⃣ build
  build:
    name: Build App
    runs-on: macos-latest
    needs: generate
    steps:
      - uses: actions/checkout@v4

      - name: Build (no signing)
        run: |
          xcodebuild \
            -project ProjectRUSHIN.xcodeproj \
            -scheme ProjectRUSHIN \
            -sdk iphoneos \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR=build \
            clean build

  # 4️⃣ package
  package:
    name: Package IPA
    runs-on: macos-latest
    needs: build
    steps:
      - name: Create IPA
        run: |
          mkdir -p output
          cp -r build/Debug-iphoneos/ProjectRUSHIN.app Payload
          zip -r output/ProjectRUSHIN.ipa Payload

  # 5️⃣ summary
  summary:
    name: Upload & Summary
    runs-on: macos-latest
    needs: package
    steps:
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRUSHIN-IPA
          path: output/ProjectRUSHIN.ipa

      - name: Done
        run: echo "✅ build complete. download your ipa from artifacts."