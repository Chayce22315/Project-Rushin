name: Build & Sideload ProjectRushin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest

    steps:
      # 📦 Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🧰 Install XcodeGen (CORRECT WAY)
      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      # 🔍 Verify (so we NEVER get that bug again)
      - name: Verify XcodeGen
        run: |
          which xcodegen
          xcodegen version

      # ⚙️ Generate project
      - name: Generate Xcode project
        run: |
          xcodegen generate --spec project.yml

      # 🏗️ Build app (REAL binary output)
      - name: Build App (Release)
        run: |
          xcodebuild \
            -project ProjectRushin.xcodeproj \
            -scheme ProjectRushin \
            -configuration Release \
            -sdk iphoneos \
            BUILD_DIR=$PWD/build \
            BUILD_ROOT=$PWD/build \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      # 🧪 SAFETY CHECK (prevents %%1.app error)
      - name: Verify App Binary
        run: |
          echo "===== Checking .app contents ====="
          ls -la build/Release-iphoneos/ProjectRushin.app

          if [ ! -f build/Release-iphoneos/ProjectRushin.app/ProjectRushin ]; then
            echo "❌ Executable missing! Build failed."
            exit 1
          fi

          echo "✅ Executable exists!"

      # 📦 Create IPA
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/ProjectRushin.app Payload/
          zip -r ProjectRushin.ipa Payload
          echo "✅ IPA created!"

      # ☁️ Upload IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRushin-IPA
          path: ProjectRushin.ipa
