name: Build ProjectRushin (IPA - Stable)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_all:
    runs-on: macos-26

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Debug (optional but helpful)
      - name: Debug Files
        run: |
          echo "===== ROOT FILES ====="
          ls -la
          echo "===== project.yml ====="
          cat project.yml

      # Select Xcode
      - name: Use Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      # Install XcodeGen via Homebrew (correct way)
      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      # Fix PATH so xcodegen is usable
      - name: Setup PATH
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      # Verify installation (CRITICAL)
      - name: Verify XcodeGen
        run: |
          which xcodegen
          xcodegen version

      # Generate project
      - name: Generate Project
        run: |
          xcodegen generate --spec project.yml

      # Confirm project exists
      - name: Verify Project
        run: |
          if [ -d ProjectRushin.xcodeproj ]; then
            echo "PROJECT GENERATED ✅"
          else
            echo "PROJECT FAILED ❌"
            exit 1
          fi

      # Clean build
      - name: Clean
        run: |
          rm -rf build
          xcodebuild clean -project ProjectRushin.xcodeproj -scheme ProjectRushin || true

      # Archive for real iPhone (no signing yet)
      - name: Archive App
        run: |
          xcodebuild \
            -project ProjectRushin.xcodeproj \
            -scheme ProjectRushin \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/ProjectRushin.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      # Create IPA manually (for sideload tools)
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ProjectRushin.xcarchive/Products/Applications/ProjectRushin.app Payload/
          zip -r ProjectRushin.ipa Payload
          rm -rf Payload

      # Upload IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRushin-IPA
          path: ProjectRushin.ipa
