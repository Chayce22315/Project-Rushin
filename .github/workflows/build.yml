name: ProjectRUSHIN iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  setup:
    name: Setup Environment
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Homebrew Dependencies
        run: |
          brew install xcodegen

      - name: Set up Ruby (for CocoaPods if needed)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

  generate:
    name: Generate Xcode Project
    runs-on: macos-latest
    needs: setup
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec project.yml --project ProjectRUSHIN.xcodeproj

      - name: List Schemes
        run: |
          xcodebuild -list -project ProjectRUSHIN.xcodeproj

  build:
    name: Build Unsigned IPA
    runs-on: macos-latest
    needs: generate
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Project
        run: |
          xcodebuild -project ProjectRUSHIN.xcodeproj \
            -scheme ProjectRUSHIN \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/ProjectRUSHIN.xcarchive archive

      - name: Export Unsigned IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $PWD/build/ProjectRUSHIN.xcarchive \
            -exportPath $PWD/output \
            -exportOptionsPlist exportOptions.plist

  package:
    name: Package & Upload IPA
    runs-on: macos-latest
    needs: build
    steps:
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRUSHIN-Unsigned-IPA
          path: output/ProjectRUSHIN.ipa

  summary:
    name: Build Summary
    runs-on: macos-latest
    needs: package
    steps:
      - name: Show Build Summary
        run: |
          echo "---------------------------------"
          echo "ProjectRUSHIN Build Summary"
          echo "---------------------------------"
          echo "Branch: $GITHUB_REF"
          echo "IPA path: output/ProjectRUSHIN.ipa"
          echo "Jobs executed:"
          echo "1. Setup environment"
          echo "2. Generate Xcode project"
          echo "3. Build unsigned IPA"
          echo "4. Package & upload IPA"
          echo "5. Summary complete 🎉"