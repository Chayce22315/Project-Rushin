name: Build ProjectRushin (Debug + IPA)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_all:
    runs-on: macos-26

    steps:
      # Checkout repo (VERY IMPORTANT)
      - name: Checkout
        uses: actions/checkout@v4

      # Debug EVERYTHING (this is the key 🔥)
      - name: 🔍 DEBUG FILES
        run: |
          echo "===== CURRENT DIR ====="
          pwd

          echo "===== ROOT FILES ====="
          ls -la

          echo "===== ALL FILES ====="
          ls -R

          echo "===== CHECK project.yml ====="
          if [ -f project.yml ]; then
            echo "FOUND project.yml ✅"
          else
            echo "MISSING project.yml ❌"
          fi

          echo "===== PRINT project.yml ====="
          cat project.yml || echo "CANNOT READ FILE ❌"

      # Select Xcode
      - name: Use Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      # Install XcodeGen (stable binary)
      - name: Install XcodeGen
        run: |
          curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.45.1/xcodegen.zip -o xcodegen.zip
          unzip xcodegen.zip
          chmod +x xcodegen/bin/xcodegen
          sudo mv xcodegen/bin/xcodegen /usr/local/bin/xcodegen

      # Generate project (retry safe)
      - name: Generate Project
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            xcodegen generate --spec project.yml --project ProjectRushin.xcodeproj && break
            echo "Retrying..."
            sleep 2
          done

      # Verify project exists
      - name: Verify Project
        run: |
          if [ -d ProjectRushin.xcodeproj ]; then
            echo "PROJECT GENERATED ✅"
          else
            echo "PROJECT MISSING ❌"
            exit 1
          fi

      # Clean build
      - name: Clean
        run: |
          rm -rf build
          xcodebuild clean -project ProjectRushin.xcodeproj -scheme ProjectRushin || true

      # Archive for REAL iPhone (no signing yet)
      - name: Archive App
        run: |
          xcodebuild \
            -project ProjectRushin.xcodeproj \
            -scheme ProjectRushin \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/ProjectRushin.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      # Create IPA manually (for sideload tools)
      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ProjectRushin.xcarchive/Products/Applications/ProjectRushin.app Payload/
          zip -r ProjectRushin.ipa Payload
          rm -rf Payload

      # Upload IPA
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRushin-IPA
          path: ProjectRushin.ipa
