name: Build ProjectRUSHIN Beta

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  setup:
    name: Setup Environment
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo 'eval "$(/opt/homebrew/bin/brew shellenv)"' >> ~/.zprofile
          eval "$(/opt/homebrew/bin/brew shellenv)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Add Homebrew to PATH
        run: echo "/opt/homebrew/bin" >> $GITHUB_PATH

      - name: Verify XcodeGen
        run: xcodegen --version

  generate_xcodeproj:
    name: Generate Xcode Project
    runs-on: macos-latest
    needs: setup
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Project
        run: xcodegen generate --spec project.yml --project ProjectRUSHIN.xcodeproj

      - name: List Project Files
        run: ls -la

  build_unsigned_ipa:
    name: Build Unsigned IPA
    runs-on: macos-latest
    needs: generate_xcodeproj
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build IPA
        run: |
          xcodebuild -project ProjectRUSHIN.xcodeproj \
                     -scheme ProjectRUSHIN \
                     -configuration Debug \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          mkdir -p output
          xcrun -sdk iphoneos PackageApplication \
            -v build/Build/Products/Debug-iphoneos/ProjectRUSHIN.app \
            -o output/ProjectRUSHIN.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ProjectRUSHIN-Unsigned
          path: output/ProjectRUSHIN.ipa

  summary:
    name: Workflow Summary
    runs-on: macos-latest
    needs: [setup, generate_xcodeproj, build_unsigned_ipa]
    steps:
      - name: Show Summary
        run: |
          echo "✅ Setup, XcodeProj generation, and unsigned IPA build completed!"
          echo "You can download the IPA from the artifacts section."