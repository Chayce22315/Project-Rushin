name: ProjectRushin

options:
  minimumXcodeGenVersion: 2.30.0

configs:
  Debug: debug
  Release: release

settings:
  base:
    PRODUCT_NAME: ProjectRushin
    SWIFT_VERSION: 5.9

targets:
  ProjectRushin:
    type: application
    platform: iOS

    sources:
      - Sources

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelatedstudios.rushin
        INFOPLIST_FILE: Info.plist
        IPHONEOS_DEPLOYMENT_TARGET: 16.0

schemes:
  ProjectRushin:
    build:
      targets:
        ProjectRushin: all
    run:
      config: Debug
