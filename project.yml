name: ProjectRushin

options:
  bundleIdPrefix: com.pixelatedstudios

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 16.0

targets:
  ProjectRushin:
    type: application
    platform: iOS

    sources:
      - path: Sources

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pixelatedstudios.rushin
        INFOPLIST_FILE: Info.plist

schemes:
  ProjectRushin:
    build:
      targets:
        ProjectRushin: all
